services:
  backend:
    build:
      context: ./backend
    image: ngoalongg/voice-agent-vnjp:backend-latest  # thêm tên đằng trước dễ up lên Docker Hub
    ports:
      - '8443:8081'
    env_file:
      - ./.env
    volumes:
      - ./backend/google-credentials.json:/app/google-credentials.json:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: ngoalongg/voice-agent-vnjp:frontend-latest
    ports:
      - '80:5174'
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8443
    depends_on:
      - backend
    restart: unless-stopped