<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Voice Agent Vn-Jp logo</title>
  <desc id="desc">A microphone and waveform mark for Vietnamese Japanese voice translation.</desc>
  <defs>
    <linearGradient id="bg" x1="34" y1="30" x2="218" y2="225" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10233F"/>
      <stop offset="0.48" stop-color="#0E5C78"/>
      <stop offset="1" stop-color="#D33F6A"/>
    </linearGradient>
    <linearGradient id="wave" x1="42" y1="120" x2="214" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#FCA5A5"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#031018" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="58" fill="url(#bg)"/>
